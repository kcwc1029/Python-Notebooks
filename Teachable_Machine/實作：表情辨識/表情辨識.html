<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 情緒辨識網站</title>

  <link rel="icon" href="data:," />

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      color: white;
      background:
        radial-gradient(circle at top left, #38bdf8, transparent 32%),
        radial-gradient(circle at bottom right, #a78bfa, transparent 36%),
        linear-gradient(135deg, #020617, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1050px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 30px;
      padding: 26px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #bfdbfe;
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .subtitle {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 26px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 800;
      color: #020617;
      background: linear-gradient(135deg, #67e8f9, #c4b5fd);
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(103, 232, 249, 0.28);
    }

    .tips {
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.8;
    }

    #webcam-container {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.58);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder {
      color: #94a3b8;
      text-align: center;
      padding: 20px;
    }

    .result-box {
      text-align: center;
      padding: 22px;
      border-radius: 24px;
      background: rgba(2, 6, 23, 0.52);
      margin-bottom: 22px;
    }

    .result-label {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    #top-result {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    #confidence {
      color: #bae6fd;
      font-size: 18px;
      font-weight: 700;
    }

    .label-row {
      margin-bottom: 16px;
    }

    .label-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .label-name {
      color: #f8fafc;
    }

    .label-score {
      color: #bfdbfe;
      font-weight: 700;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      overflow: hidden;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      transition: width 0.2s ease;
    }

    .status {
      margin-top: 14px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .app {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .card {
        padding: 20px;
        border-radius: 24px;
      }

      #top-result {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="card">
      <div class="badge">Teachable Machine Emotion AI</div>

      <h1>AI 情緒辨識網站</h1>

      <p class="subtitle">
        開啟攝影機後，系統會即時分析畫面中的表情，顯示目前最可能的情緒與信心分數。
      </p>

      <button id="start-btn" onclick="init()">開始辨識</button>

      <p class="tips">
        建議臉部靠近鏡頭中央，保持光線充足。背景越單純，辨識結果會越穩。
      </p>
    </section>

    <section class="card">
      <div id="webcam-container">
        <div class="placeholder">攝影機畫面會顯示在這裡</div>
      </div>

      <div class="result-box">
        <div class="result-label">目前情緒</div>
        <div id="top-result">尚未開始</div>
        <div id="confidence">信心分數：0%</div>
      </div>

      <div id="label-container"></div>

      <div class="status" id="status-text">
        狀態：等待開始
      </div>
    </section>
  </main>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/U18TZU9Dd/";

    let model;
    let webcam;
    let maxPredictions;
    let isRunning = false;

    async function init() {
      if (isRunning) return;

      const statusText = document.getElementById("status-text");
      const startBtn = document.getElementById("start-btn");

      try {
        startBtn.innerText = "模型載入中...";
        statusText.innerText = "狀態：正在載入模型";

        if (typeof tmImage === "undefined") {
          throw new Error("tmImage 沒有載入成功，請檢查 CDN 或網路連線。");
        }

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(520, 390, true);
        await webcam.setup();
        await webcam.play();

        isRunning = true;

        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        createLabelRows();

        startBtn.innerText = "辨識中";
        statusText.innerText = "狀態：攝影機已啟動，正在辨識情緒";

        window.requestAnimationFrame(loop);

      } catch (error) {
        console.error(error);
        startBtn.innerText = "重新開始";
        statusText.innerText = "狀態：啟動失敗，請看 Console 錯誤訊息";
        alert(error.message);
      }
    }

    function createLabelRows() {
      const labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        const row = document.createElement("div");
        row.className = "label-row";

        row.innerHTML = `
          <div class="label-head">
            <span class="label-name">載入中</span>
            <span class="label-score">0%</span>
          </div>
          <div class="bar">
            <div class="bar-fill"></div>
          </div>
        `;

        labelContainer.appendChild(row);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const predictions = await model.predict(webcam.canvas);

      predictions.sort((a, b) => b.probability - a.probability);

      const top = predictions[0];
      const topPercent = Math.round(top.probability * 100);

      document.getElementById("top-result").innerText =
        convertEmotionName(top.className);

      document.getElementById("confidence").innerText =
        `信心分數：${topPercent}%`;

      const rows = document.querySelectorAll(".label-row");

      predictions.forEach((prediction, index) => {
        const percent = Math.round(prediction.probability * 100);

        rows[index].querySelector(".label-name").innerText =
          convertEmotionName(prediction.className);

        rows[index].querySelector(".label-score").innerText =
          `${percent}%`;

        rows[index].querySelector(".bar-fill").style.width =
          `${percent}%`;
      });
    }

    function convertEmotionName(name) {
      const lower = name.toLowerCase();

      if (lower.includes("happy") || lower.includes("smile") || lower.includes("開心") || lower.includes("高興")) {
        return "😊 開心";
      }

      if (lower.includes("sad") || lower.includes("難過") || lower.includes("傷心")) {
        return "😢 難過";
      }

      if (lower.includes("angry") || lower.includes("生氣") || lower.includes("憤怒")) {
        return "😠 生氣";
      }

      if (lower.includes("surprise") || lower.includes("驚訝")) {
        return "😲 驚訝";
      }

      if (lower.includes("normal") || lower.includes("neutral") || lower.includes("自然") || lower.includes("普通")) {
        return "😐 平靜";
      }

      return name;
    }
  </script>
</body>
</html>
