<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 影像辨識系統</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Noto Sans TC", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #7dd3fc, transparent 35%),
        radial-gradient(circle at bottom right, #c084fc, transparent 35%),
        linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 24px;
      line-height: 1.7;
    }

    #webcam-container {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #webcam-container canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      margin-top: 22px;
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, #a7f3d0, #67e8f9);
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(103, 232, 249, 0.35);
    }

    .result-title {
      font-size: 22px;
      margin-bottom: 18px;
    }

    .top-result {
      padding: 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      margin-bottom: 20px;
    }

    .label-name {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .score {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
    }

    .prediction-item {
      margin-bottom: 18px;
    }

    .prediction-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #67e8f9, #a7f3d0);
      transition: width 0.25s;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.6;
    }

    @media (max-width: 850px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .container {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px;
        border-radius: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .label-name {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <h1>AI 影像辨識系統</h1>
      <p class="subtitle">
        開啟攝影機後，系統會即時讀取畫面，並透過 Teachable Machine 模型判斷目前影像類別。
      </p>

      <div id="webcam-container">
        <p>尚未啟動攝影機</p>
      </div>

      <button onclick="init()">啟動 AI 辨識</button>
    </section>

    <section class="card">
      <h2 class="result-title">辨識結果</h2>

      <div class="top-result">
        <div id="main-label" class="label-name">等待辨識中</div>
        <div id="main-score" class="score">信心分數：0%</div>
      </div>

      <div id="label-container"></div>

      <p class="hint">
        小提醒：手機使用時需要允許瀏覽器開啟相機。若畫面無法顯示，建議使用 Chrome 或 Edge 測試。
      </p>
    </section>
  </main>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/4aFLNmmOo/";

    let model;
    let webcam;
    let labelContainer;
    let maxPredictions;
    let isRunning = false;

    async function init() {
      if (isRunning) return;

      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(640, 480, true);
      await webcam.setup({
        facingMode: "environment"
      });
      await webcam.play();

      isRunning = true;
      window.requestAnimationFrame(loop);

      const webcamContainer = document.getElementById("webcam-container");
      webcamContainer.innerHTML = "";
      webcamContainer.appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        const item = document.createElement("div");
        item.className = "prediction-item";

        item.innerHTML = `
          <div class="prediction-row">
            <span class="class-name">類別</span>
            <span class="class-score">0%</span>
          </div>
          <div class="bar">
            <div class="bar-fill"></div>
          </div>
        `;

        labelContainer.appendChild(item);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const predictions = await model.predict(webcam.canvas);

      predictions.sort((a, b) => b.probability - a.probability);

      const top = predictions[0];
      const topPercent = (top.probability * 100).toFixed(1);

      document.getElementById("main-label").textContent = top.className;
      document.getElementById("main-score").textContent = `信心分數：${topPercent}%`;

      predictions.forEach((prediction, index) => {
        const percent = (prediction.probability * 100).toFixed(1);
        const item = labelContainer.children[index];

        item.querySelector(".class-name").textContent = prediction.className;
        item.querySelector(".class-score").textContent = `${percent}%`;
        item.querySelector(".bar-fill").style.width = `${percent}%`;
      });
    }
  </script>
</body>
</html>
